<!-- Tarjeta de creación de tarea -->
<div class="bg-zinc-800 border border-zinc-700 rounded-2xl shadow-2xl w-full p-6 flex flex-col gap-5">

  <!-- Encabezado -->
  <div class="flex items-center justify-between">
    <h2 class="text-lg font-semibold text-white tracking-tight">Nueva tarea</h2>
    <!-- Botón X para cancelar -->
    <button
      (click)="onCancel()"
      class="text-zinc-500 hover:text-zinc-200 transition-colors rounded-lg p-1 hover:bg-zinc-700"
      aria-label="Cancelar"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Campo: Título -->
  <div class="flex flex-col gap-1.5">
    <label for="task-title" class="text-sm font-medium text-zinc-300">
      Título <span class="text-red-400">*</span>
    </label>
    <input
      id="task-title"
      type="text"
      [value]="title()"
      (input)="onTitleInput($event)"
      placeholder="¿Qué hay que hacer?"
      maxlength="255"
      class="bg-zinc-900 border rounded-lg px-3.5 py-2.5 text-sm text-white placeholder-zinc-500
             outline-none transition-all
             focus:ring-2 focus:ring-indigo-500 focus:border-transparent
             disabled:opacity-50"
      [class.border-red-500]="titleError()"
      [class.border-zinc-700]="!titleError()"
    />
    @if (titleError()) {
      <p class="text-xs text-red-400 flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 shrink-0" viewBox="0 0 24 24"
             fill="currentColor"><path d="M12 4a8 8 0 1 0 0 16A8 8 0 0 0 12 4zm0 4a.75.75 0 0 1 .75.75v4a.75.75 0 0 1-1.5 0v-4A.75.75 0 0 1 12 8zm0 7.5a.875.875 0 1 1 0 1.75.875.875 0 0 1 0-1.75z"/></svg>
        {{ titleError() }}
      </p>
    }
  </div>

  <!-- Campo: Descripción -->
  <div class="flex flex-col gap-1.5">
    <label for="task-description" class="text-sm font-medium text-zinc-300">
      Descripción <span class="text-red-400">*</span>
    </label>
    <textarea
      id="task-description"
      rows="3"
      [value]="description()"
      (input)="onDescriptionInput($event)"
      placeholder="Agrega más detalle sobre la tarea..."
      maxlength="2000"
      class="bg-zinc-900 border rounded-lg px-3.5 py-2.5 text-sm text-white placeholder-zinc-500
             outline-none resize-none transition-all
             focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
      [class.border-red-500]="descriptionError()"
      [class.border-zinc-700]="!descriptionError()"
    ></textarea>
    @if (descriptionError()) {
      <p class="text-xs text-red-400 flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 shrink-0" viewBox="0 0 24 24"
             fill="currentColor"><path d="M12 4a8 8 0 1 0 0 16A8 8 0 0 0 12 4zm0 4a.75.75 0 0 1 .75.75v4a.75.75 0 0 1-1.5 0v-4A.75.75 0 0 1 12 8zm0 7.5a.875.875 0 1 1 0 1.75.875.875 0 0 1 0-1.75z"/></svg>
        {{ descriptionError() }}
      </p>
    }
  </div>

  <!-- Campo: Fecha límite (opcional) -->
  <div class="flex flex-col gap-1.5">
    <label for="task-due-date" class="text-sm font-medium text-zinc-300">
      Fecha límite
      <span class="text-zinc-500 font-normal">(opcional)</span>
    </label>
    <div class="relative">
      <input
        id="task-due-date"
        type="date"
        [value]="dueDate()"
        [min]="minDate"
        (input)="onDueDateInput($event)"
        class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-white
               outline-none transition-all appearance-none
               focus:ring-2 focus:ring-indigo-500 focus:border-transparent
               [color-scheme:dark]"
      />
      @if (dueDate()) {
        <!-- Botón para limpiar la fecha -->
        <button
          type="button"
          (click)="dueDate.set('')"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-200 transition-colors"
          aria-label="Quitar fecha"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      }
    </div>
  </div>

  <!-- Acciones -->
  <div class="flex gap-3 pt-1">
    <button
      (click)="onCancel()"
      class="flex-1 px-4 py-2.5 rounded-lg text-sm font-medium
             text-zinc-300 bg-zinc-700 hover:bg-zinc-600
             transition-colors border border-zinc-600"
    >
      Cancelar
    </button>

    <button
      (click)="onSave()"
      class="flex-1 px-4 py-2.5 rounded-lg text-sm font-semibold
             transition-all
             bg-indigo-600 hover:bg-indigo-500 text-white
             disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-indigo-600
             focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 focus:ring-offset-zinc-800"
    >
      Guardar tarea
    </button>
  </div>

</div>
