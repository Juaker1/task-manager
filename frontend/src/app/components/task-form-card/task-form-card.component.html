<!-- Tarjeta de creación de tarea -->
<div class="bg-zinc-800 border border-zinc-700 rounded-2xl shadow-2xl w-full p-6 flex flex-col gap-5">

  <!-- ── Encabezado ────────────────────────────────────────────── -->
  <div class="flex items-center justify-between">
    <h2 class="text-lg font-semibold text-white tracking-tight">
      {{ isEditMode() ? 'Editar tarea' : 'Nueva tarea' }}
    </h2>
    <button
      (click)="onCancel()"
      class="text-zinc-500 hover:text-zinc-200 transition-colors rounded-lg p-1 hover:bg-zinc-700"
      aria-label="Cancelar"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- ── Campo: Título + Toggle Diaria + Grupo ─────────────────── -->
  <div class="flex flex-col gap-1.5">
    <div class="flex items-center justify-between gap-3">
      <label for="task-title" class="text-sm font-medium text-zinc-300 flex-shrink-0">
        Título <span class="text-red-400">*</span>
      </label>

      <!-- Controles inline: toggle + grupo -->
      <div class="flex items-center gap-3">

        <!-- Toggle switch: Diaria (se deshabilita si hay fecha seleccionada) -->
        <button
          type="button"
          (click)="onToggleDaily()"
          [disabled]="!!dueDate()"
          class="flex items-center gap-2 group transition-opacity"
          [class.opacity-40]="!!dueDate()"
          [class.cursor-not-allowed]="!!dueDate()"
          [attr.aria-pressed]="isDaily()"
          [attr.aria-disabled]="!!dueDate()"
          aria-label="Tarea diaria"
        >
          <span class="text-xs transition-colors"
                [class.text-blue-400]="isDaily()"
                [class.text-zinc-500]="!isDaily()">
            Diaria
          </span>
          <!-- Pill -->
          <span class="relative inline-flex h-5 w-9 flex-shrink-0 rounded-full border-2 border-transparent
                       transition-colors duration-200"
                [class.bg-blue-600]="isDaily()"
                [class.bg-zinc-600]="!isDaily()"
                [class.cursor-not-allowed]="!!dueDate()"
                [class.cursor-pointer]="!dueDate()">
            <span class="pointer-events-none inline-block h-4 w-4 transform rounded-full
                         bg-white shadow transition-transform duration-200"
                  [class.translate-x-4]="isDaily()"
                  [class.translate-x-0]="!isDaily()">
            </span>
          </span>
        </button>

        <!-- Divisor -->
        <span class="w-px h-4 bg-zinc-700 flex-shrink-0"></span>

        <!-- Selector de proyecto -->
        <div class="relative flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-zinc-500 absolute left-2.5 pointer-events-none"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <select
            (change)="onGroupChange($event)"
            [disabled]="groups().length === 0"
            class="appearance-none bg-zinc-900 border border-zinc-700 rounded-lg
                   pl-7 pr-6 py-1 text-xs text-zinc-300 outline-none
                   focus:ring-1 focus:ring-blue-500 focus:border-blue-500
                   disabled:opacity-40 disabled:cursor-not-allowed
                   transition-colors cursor-pointer hover:border-zinc-600
                   [color-scheme:dark]"
            [attr.title]="groups().length === 0 ? 'No hay proyectos. Créalos desde el sidebar.' : null"
          >
            <option value="">
              {{ groups().length === 0 ? 'Sin proyectos' : 'Sin proyecto' }}
            </option>
            @for (group of groups(); track group.id) {
              <option [value]="group.id"
                      [selected]="selectedGroupId() === group.id">
                {{ group.name }}
              </option>
            }
          </select>
          <!-- Chevron -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-zinc-500 absolute right-2 pointer-events-none"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </div>

      </div>
    </div>

    <input
      id="task-title"
      type="text"
      [value]="title()"
      (input)="onTitleInput($event)"
      placeholder="¿Qué hay que hacer?"
      maxlength="255"
      class="bg-zinc-900 border rounded-lg px-3.5 py-2.5 text-sm text-white placeholder-zinc-500
             outline-none transition-all
             focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:opacity-50"
      [class.border-red-500]="titleError()"
      [class.border-zinc-700]="!titleError()"
    />
    @if (titleError()) {
      <p class="text-xs text-red-400 flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 shrink-0" viewBox="0 0 24 24"
             fill="currentColor"><path d="M12 4a8 8 0 1 0 0 16A8 8 0 0 0 12 4zm0 4a.75.75 0 0 1 .75.75v4a.75.75 0 0 1-1.5 0v-4A.75.75 0 0 1 12 8zm0 7.5a.875.875 0 1 1 0 1.75.875.875 0 0 1 0-1.75z"/></svg>
        {{ titleError() }}
      </p>
    }
  </div>

  <!-- ── Campo: Descripción ────────────────────────────────────── -->
  <div class="flex flex-col gap-1.5">
    <label for="task-description" class="text-sm font-medium text-zinc-300">
      Descripción <span class="text-zinc-500 font-normal">(opcional)</span>
    </label>
    <textarea
      id="task-description"
      rows="3"
      [value]="description()"
      (input)="onDescriptionInput($event)"
      placeholder="Agrega más detalle sobre la tarea..."
      maxlength="2000"
      class="bg-zinc-900 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-white placeholder-zinc-500
             outline-none resize-none transition-all
             focus:ring-2 focus:ring-blue-500 focus:border-transparent"
    ></textarea>
  </div>

  <!-- ── Campo: Prioridad ───────────────────────────────────────── -->
  <div class="flex flex-col gap-1.5">
    <label class="text-sm font-medium text-zinc-300">Prioridad</label>
    <div class="flex gap-2">

      <!-- Baja -->
      <button
        type="button"
        (click)="onPriorityChange('low')"
        class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg border text-xs font-medium
               transition-all"
        [class.bg-zinc-700]="priority() === 'low'"
        [class.border-zinc-500]="priority() === 'low'"
        [class.text-zinc-200]="priority() === 'low'"
        [class.bg-zinc-900]="priority() !== 'low'"
        [class.border-zinc-700]="priority() !== 'low'"
        [class.text-zinc-500]="priority() !== 'low'"
        [class.hover:border-zinc-500]="priority() !== 'low'"
      >
        <span class="w-2 h-2 rounded-full bg-zinc-400 flex-shrink-0"></span>
        Baja
      </button>

      <!-- Media -->
      <button
        type="button"
        (click)="onPriorityChange('medium')"
        class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg border text-xs font-medium
               transition-all"
        [class.bg-yellow-500/15]="priority() === 'medium'"
        [class.border-yellow-500/40]="priority() === 'medium'"
        [class.text-yellow-300]="priority() === 'medium'"
        [class.bg-zinc-900]="priority() !== 'medium'"
        [class.border-zinc-700]="priority() !== 'medium'"
        [class.text-zinc-500]="priority() !== 'medium'"
      >
        <span class="w-2 h-2 rounded-full bg-yellow-400 flex-shrink-0"></span>
        Media
      </button>

      <!-- Alta -->
      <button
        type="button"
        (click)="onPriorityChange('high')"
        class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg border text-xs font-medium
               transition-all"
        [class.bg-red-500/15]="priority() === 'high'"
        [class.border-red-500/40]="priority() === 'high'"
        [class.text-red-300]="priority() === 'high'"
        [class.bg-zinc-900]="priority() !== 'high'"
        [class.border-zinc-700]="priority() !== 'high'"
        [class.text-zinc-500]="priority() !== 'high'"
      >
        <span class="w-2 h-2 rounded-full bg-red-400 flex-shrink-0"></span>
        Alta
      </button>

    </div>
  </div>

  <!-- ── Campo: Fecha límite + Hora ────────────────────────────── -->
  <!-- Deshabilitado visualmente cuando la tarea es Diaria -->
  <div class="flex flex-col gap-1.5 transition-opacity duration-200"
       [class.opacity-40]="isDaily()"
       [class.pointer-events-none]="isDaily()">
    <!-- Sublabels -->
    <div class="flex items-center justify-between">
      <label class="text-sm font-medium text-zinc-300">
        Fecha límite
        <span class="text-zinc-500 font-normal">(opcional)</span>
      </label>
      <span class="text-xs text-zinc-500 transition-opacity duration-200"
            [class.opacity-0]="!dueDate()">
        Hora <span class="text-zinc-600">(opcional)</span>
      </span>
    </div>
    <div class="flex gap-2">

      <!-- Input de fecha -->
      <div class="relative flex-1">
        <input
          id="task-due-date"
          type="date"
          [value]="dueDate()"
          [min]="minDate"
          [disabled]="isDaily()"
          (input)="onDueDateInput($event)"
          class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-white
                 outline-none transition-all appearance-none
                 focus:ring-2 focus:ring-blue-500 focus:border-transparent
                 disabled:cursor-not-allowed [color-scheme:dark]"
          [class.pr-8]="dueDate()"
        />
        @if (dueDate()) {
          <button
            type="button"
            (click)="dueDate.set(''); dueTime.set('')"
            class="absolute right-2.5 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-200
                   transition-colors bg-zinc-900 rounded p-0.5"
            aria-label="Quitar fecha"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        }
      </div>

      <!-- Selector de hora (habilitado solo si hay fecha) -->
      <div class="relative" [class.opacity-40]="!dueDate()" [class.pointer-events-none]="!dueDate()">
        <select
          [disabled]="!dueDate() || isDaily()"
          (change)="onDueTimeInput($event)"
          class="w-28 bg-zinc-900 border border-zinc-700 rounded-lg pl-3 pr-7 py-2.5
                 text-sm text-white outline-none appearance-none
                 focus:ring-2 focus:ring-blue-500 focus:border-transparent
                 disabled:cursor-not-allowed transition-colors
                 [color-scheme:dark] cursor-pointer"
        >
          <option value="">--:--</option>
          @for (t of TIME_OPTIONS; track t.value) {
            <option [value]="t.value" [selected]="dueTime() === t.value">{{ t.label }}</option>
          }
        </select>
        <!-- Chevron -->
        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-3.5 h-3.5 text-zinc-500 absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </div>

    </div>
  </div>

  <!-- ── Acciones ──────────────────────────────────────────────── -->
  <div class="flex gap-3 pt-1">
    <button
      (click)="onCancel()"
      class="flex-1 px-4 py-2.5 rounded-lg text-sm font-medium
             text-zinc-300 bg-zinc-700 hover:bg-zinc-600
             transition-colors border border-zinc-600"
    >
      Cancelar
    </button>
    <button
      (click)="onSave()"
      class="flex-1 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all
             bg-blue-600 hover:bg-blue-500 text-white
             disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-blue-600
             focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 focus:ring-offset-zinc-800"
    >
      {{ isEditMode() ? 'Guardar cambios' : 'Guardar tarea' }}
    </button>
  </div>

</div>
